# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      # Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # Install dependencies and build Next.js app.
      # NEXT_PUBLIC_* values are baked into the bundle at build time, so OTP
      # Firebase config must be present here for SMS / Customer App OTP to work.
      # Main project keys live in web/.env (committed); OTP keys come from
      # GH Actions repository secrets (added via `gh secret set`).
      - name: Install and build
        working-directory: web
        env:
          NEXT_PUBLIC_OTP_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_OTP_FIREBASE_API_KEY }}
          NEXT_PUBLIC_OTP_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_OTP_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_OTP_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_OTP_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_OTP_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_OTP_FIREBASE_APP_ID }}
        run: npm ci && npx next build

      # Deploy to Firebase Hosting
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KKR_GROCERIES_02 }}
          channelId: live
          projectId: kkr-groceries-02
