name: CI Build Check

# Validates that the web app compiles/type-checks and the functions parse,
# on every PR to main — catches breakage BEFORE it can be merged & deployed.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  web-build:
    name: Web build & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build (Next.js — includes TypeScript check)
        run: npx next build --webpack

  functions-check:
    name: Functions syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - name: Syntax-check all function modules
        run: |
          for f in *.js; do
            echo "Checking $f"
            node --check "$f"
          done
